<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindWave</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen;
        background: linear-gradient(135deg, #5f2c82, #49a09d);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 400px;
        padding: 20px;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    p {
        font-size: 18px;
        opacity: 0.9;
    }

    .buttons {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    a {
        text-decoration: none;
        padding: 14px;
        border-radius: 16px;
        font-weight: 600;
        transition: 0.2s;
    }

    .primary {
        background-color: white;
        color: #5f2c82;
    }

    .primary:hover {
        transform: scale(1.03);
    }

    .secondary {
        border: 1px solid rgba(255,255,255,0.6);
        color: white;
    }

    .secondary:hover {
        background-color: rgba(255,255,255,0.1);
    }

    .footer {
        margin-top: 30px;
        font-size: 14px;
        opacity: 0.7;
    }
</style>

</head>

<body>

<div class="container">
    <h1>MindWave</h1>
    
    <p>
        Track your emotions, relax your mind, and improve your well-being with guided meditations and calming sounds.
    </p>

    <div class="buttons">
        <a href="mailto:emilianofumis@icloud.com" class="primary">Contact Support</a>
        <a href="/privacy.html" class="secondary">Privacy Policy</a>
    </div>

    <div class="footer">
        © 2026 Emiliano Fumis
    </div>
</div>

</body>
</html>
